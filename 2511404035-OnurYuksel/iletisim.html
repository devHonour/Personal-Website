    <table class="contactTable">
  <thead>
    <tr>
      <th colspan="2">Send a Message to DevHonour</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td class="labelCell"><label for="email">Your Email:</label></td>
      <td>
        <input type="email" id="email" name="email" placeholder="name@example.com" required class="contactInput">
      </td>
    </tr>
    <tr>
      <td class="labelCell"><label for="message">Message:</label></td>
      <td>
        <textarea id="message" name="message" rows="6" placeholder="Type your message here..." class="contactInput"></textarea>
      </td>
    </tr>
    <tr>
      <td colspan="2" class="submitCell">
        <button type="submit">Submit Message</button>
      </td>
    </tr>
  </tbody>
</table>
